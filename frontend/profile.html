<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile - Food Pal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
             sans: ['Inter', 'sans-serif'],
             display: ['Outfit', 'sans-serif'],
          },
          colors: {
             brand: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 900: '#14532d' }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles/tailwind.css">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#F5F1E8] text-slate-900 min-h-screen flex flex-col">
  <header id="navbar" class="bg-white/80 backdrop-blur border-b border-white/60 sticky top-0 z-10"></header>

  <main class="flex-1 user-shell mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-10 w-full animate-fade-in" style="animation: fadeIn 0.5s ease-out">
    <section class="profile-page-stack">
      <section class="profile-summary-section panel-card" aria-labelledby="profileSummaryTitle">
        <div class="profile-summary-heading">
          <p class="dashboard-section-label">Account</p>
          <h1 id="profileSummaryTitle" class="dashboard-section-title">Profile</h1>
          <p class="dashboard-section-copy">Your Food Pal account details and activity summary.</p>
        </div>

        <div class="profile-summary-card">
          <div class="profile-summary-user">
            <div class="profile-avatar dashboard-avatar rounded-full bg-brand-100 flex items-center justify-center text-brand-600 text-3xl font-display font-bold border-4 border-white shadow-lg">
              <span id="initials" data-profile-initials>U</span>
            </div>
            <div>
              <p class="dashboard-section-label">Signed in as</p>
              <h2 id="userName" class="dashboard-profile-name" data-profile-name>Loading...</h2>
              <p id="userEmail" class="dashboard-profile-email" data-profile-email></p>
            </div>
          </div>

          <div class="profile-summary-actions">
            <div class="profile-stat compact-stat">
              <span class="profile-stat-number" id="ratingsCount" data-ratings-count>0</span>
              <span class="profile-stat-label">Reviews</span>
            </div>
            <div class="profile-stat compact-stat">
              <span class="profile-stat-number" id="favCount" data-favorites-count>0</span>
              <span class="profile-stat-label">Favorites</span>
            </div>
            <a href="dashboard.html?section=favorites" class="profile-action-btn">
              <span>View Favorites</span>
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" /></svg>
            </a>
          </div>
        </div>
      </section>

      <div class="profile-settings-grid">
        <section class="profile-settings-card">
          <h2>Profile</h2>
          <form id="profileDetailsForm" class="profile-settings-form">
            <label>
              <span>Full Name*</span>
              <input id="profileNameInput" name="name" type="text" autocomplete="name" required>
            </label>
            <input id="profileEmailInput" name="email" type="hidden">
            <button type="submit" class="profile-primary-btn">Update Profile</button>
            <p id="profileDetailsMessage" class="profile-form-message" aria-live="polite"></p>
          </form>
        </section>

        <section class="profile-settings-card">
          <h2>Change Password</h2>
          <form id="changePasswordForm" class="profile-settings-form">
            <label>
              <span>Old Password*</span>
              <span class="profile-password-field">
                <input id="oldPasswordInput" name="oldPassword" type="password" placeholder="Old Password" autocomplete="current-password" required>
                <button type="button" data-toggle-password="oldPasswordInput" aria-label="Show password"><span class="sr-only">Show password</span></button>
              </span>
            </label>
            <label>
              <span>New Password*</span>
              <span class="profile-password-field">
                <input id="newPasswordInput" name="newPassword" type="password" placeholder="New Password" autocomplete="new-password" required>
                <button type="button" data-toggle-password="newPasswordInput" aria-label="Show password"><span class="sr-only">Show password</span></button>
              </span>
            </label>
            <p class="profile-form-help">Use at least 6 characters.</p>
            <label>
              <span>Confirm Password*</span>
              <span class="profile-password-field">
                <input id="confirmPasswordInput" name="confirmPassword" type="password" placeholder="Confirm Password" autocomplete="new-password" required>
                <button type="button" data-toggle-password="confirmPasswordInput" aria-label="Show password"><span class="sr-only">Show password</span></button>
              </span>
            </label>
            <button type="submit" class="profile-primary-btn">Update Password</button>
            <p id="changePasswordMessage" class="profile-form-message" aria-live="polite"></p>
          </form>
        </section>

        <section class="profile-settings-card profile-danger-card">
          <h2>Delete Account</h2>
          <form id="deleteAccountForm" class="profile-settings-form">
            <label>
              <span>Confirm Password*</span>
              <span class="profile-password-field">
                <input id="deletePasswordInput" name="password" type="password" autocomplete="current-password" required>
                <button type="button" data-toggle-password="deletePasswordInput" aria-label="Show password"><span class="sr-only">Show password</span></button>
              </span>
            </label>
            <button type="submit" class="profile-danger-btn">Delete Account</button>
            <p id="deleteAccountMessage" class="profile-form-message" aria-live="polite"></p>
          </form>
        </section>
      </div>
    </section>
  </main>

  <style> @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } } </style>
  <script type="module">import { initProfile } from "./js/profile.js"; initProfile();</script>
</body>
</html>
