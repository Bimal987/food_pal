<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Reviews - Food Pal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
             sans: ['Inter', 'sans-serif'],
             display: ['Outfit', 'sans-serif'],
          },
          colors: {
             brand: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 900: '#14532d' }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles/tailwind.css">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#F5F1E8] text-slate-900 min-h-screen flex flex-col">
  <header id="navbar" class="bg-white/80 backdrop-blur border-b border-white/60 sticky top-0 z-10"></header>

  <main class="flex-1 user-shell mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-10 w-full animate-fade-in" style="animation: fadeIn 0.5s ease-out">
    <section class="reviews-panel panel-card rounded-2xl p-5 sm:p-6">
      <div class="dashboard-section-header">
        <div>
          <p class="dashboard-section-label">My Reviews</p>
          <h1 id="reviewsTitle" class="dashboard-section-title">My Reviews</h1>
        </div>
        <div class="profile-stat compact-stat">
          <span class="profile-stat-number" id="ratingsCount">0</span>
          <span class="profile-stat-label">Reviews</span>
        </div>
      </div>
      <div id="ratingsList" class="profile-review-list space-y-4"></div>
    </section>
  </main>

  <style> @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } } </style>
  <script type="module">import { initReviews } from "./js/profile.js"; initReviews();</script>
</body>
</html>
